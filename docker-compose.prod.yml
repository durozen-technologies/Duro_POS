name: brolier360-pos

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-default-security: &default-security
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-backend-resources: &backend-resources
  deploy:
    resources:
      limits:
        cpus: "${BACKEND_CPU_LIMIT:-2.0}"
        memory: "${BACKEND_MEMORY_LIMIT:-1G}"
      reservations:
        cpus: "${BACKEND_CPU_RESERVATION:-0.25}"
        memory: "${BACKEND_MEMORY_RESERVATION:-256M}"
  ulimits:
    nofile:
      soft: 8192
      hard: 8192
    nproc:
      soft: 512
      hard: 512

x-backend-hardening: &backend-hardening
  read_only: true
  tmpfs:
    - /tmp/app:size=128M,mode=1777,uid=10001,gid=10001

x-caddy-hardening: &caddy-hardening
  read_only: true
  tmpfs:
    - /etc/caddy:size=2M,mode=1700,uid=10001,gid=10001
    - /tmp:size=64M,mode=1777,uid=10001,gid=10001

x-postgres-user: &postgres-user
  user: "70:70"

x-redis-user: &redis-user
  user: "999:999"

x-rustfs-user: &rustfs-user
  user: "10001:10001"

x-backend-user: &backend-user
  user: "10001:10001"

x-caddy-user: &caddy-user
  user: "10001:10001"
  cap_add:
    - NET_BIND_SERVICE

x-backend-app: &backend-app
  image: ${DOCKERHUB_USERNAME:?Set DOCKERHUB_USERNAME}/${BACKEND_IMAGE_REPO:-brolier360-pos-backend}:${BACKEND_IMAGE_TAG:?Set BACKEND_IMAGE_TAG}
  <<: [*default-security, *backend-user, *backend-resources, *backend-hardening]
  restart: unless-stopped
  logging: *default-logging
  networks:
    - data
  depends_on:
    pgbouncer:
      condition: service_healthy
    rustfs:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment: &backend-env
    APP_NAME: ${BACKEND_APP_NAME:-Brolier 360 API}
    SECRET_KEY: ${BACKEND_SECRET_KEY:?Set BACKEND_SECRET_KEY}
    DATABASE_URL: ${BACKEND_DATABASE_URL:?Set BACKEND_DATABASE_URL}
    PRODUCTION: ${BACKEND_PRODUCTION:-True}
    ALLOWED_HOSTS: ${BACKEND_ALLOWED_HOSTS:?Set BACKEND_ALLOWED_HOSTS}
    CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:?Set BACKEND_CORS_ORIGINS}
    RUSTFS_ENDPOINT_URL: ${BACKEND_RUSTFS_ENDPOINT_URL:-http://rustfs:9000}
    RUSTFS_ACCESS_KEY_ID: ${BACKEND_RUSTFS_ACCESS_KEY_ID:-${RUSTFS_ACCESS_KEY:?Set RUSTFS_ACCESS_KEY}}
    RUSTFS_SECRET_ACCESS_KEY: ${BACKEND_RUSTFS_SECRET_ACCESS_KEY:-${RUSTFS_SECRET_KEY:?Set RUSTFS_SECRET_KEY}}
    RUSTFS_BUCKET_NAME: ${BACKEND_RUSTFS_BUCKET_NAME:-brolier-360}
    RUSTFS_SERVER_DOMAINS: ${RUSTFS_SERVER_DOMAINS:?Set RUSTFS_SERVER_DOMAINS}
    RUSTFS_S3_HOST_HEADER: ${BACKEND_RUSTFS_S3_HOST_HEADER:-}
    RUSTFS_REGION_NAME: ${BACKEND_RUSTFS_REGION_NAME:-us-east-1}
    RUSTFS_PUBLIC_BASE_URL: ${BACKEND_RUSTFS_PUBLIC_BASE_URL:-}
    RUSTFS_PUBLIC_READ_ENABLED: ${BACKEND_RUSTFS_PUBLIC_READ_ENABLED:-False}
    TRUSTED_PROXIES: ${BACKEND_TRUSTED_PROXIES:-["172.16.0.0/12","10.0.0.0/8","192.168.0.0/16"]}
    TRUST_X_FORWARDED_PROTO: ${BACKEND_TRUST_X_FORWARDED_PROTO:-True}
    WEB_CONCURRENCY: ${BACKEND_WEB_CONCURRENCY:-1}
    DB_POOL_SIZE: ${BACKEND_DB_POOL_SIZE:-20}
    DB_MAX_OVERFLOW: ${BACKEND_DB_MAX_OVERFLOW:-10}
    DB_POOL_TIMEOUT: ${BACKEND_DB_POOL_TIMEOUT:-30}
    DB_POOL_RECYCLE: ${BACKEND_DB_POOL_RECYCLE:-1800}
    REDIS_URL: ${BACKEND_REDIS_URL:?Set BACKEND_REDIS_URL}
    REDIS_PREFIX: ${BACKEND_REDIS_PREFIX:-brolier360}
  expose:
    - "8000"
  healthcheck: &backend-healthcheck
    test:
      [
        "CMD-SHELL",
        "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"",
      ]
    interval: 10s
    timeout: 3s
    retries: 3
    start_period: 20s

networks:
  edge:
    name: brolier360-pos-edge
    driver: bridge
  data:
    name: brolier360-pos-internal
    driver: bridge
    internal: true

services:
  postgres:
    profiles: ["infra"]
    image: postgres:17-alpine
    <<: [*default-security, *postgres-user]
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brolier_360}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-120}
    volumes:
      - ${POSTGRES_DATA_DIR:-/home/ubuntu/pos-postgress/data}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-2.0}"
          memory: "${POSTGRES_MEMORY_LIMIT:-1G}"

  rustfs:
    profiles: ["infra"]
    build:
      context: ./rustfs
      dockerfile: Dockerfile
      target: runtime
      args:
        RUSTFS_VERSION: ${RUSTFS_VERSION:-1.0.0-beta.8}
    <<: [*default-security, *rustfs-user]
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?Set RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?Set RUSTFS_SECRET_KEY}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-false}
      RUSTFS_SERVER_DOMAINS: ${RUSTFS_SERVER_DOMAINS:?Set RUSTFS_SERVER_DOMAINS}
    volumes:
      - ${RUSTFS_DATA_DIR:-/home/ubuntu/rustfs/data}:/data
    tmpfs:
      - /logs:size=64M,uid=10001,gid=10001,mode=1777
    command:
      - --address
      - :9000
      - --server-domains
      - ${RUSTFS_SERVER_DOMAINS:?Set RUSTFS_SERVER_DOMAINS}
      - /data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -o /dev/null http://127.0.0.1:9000/health || wget -qO- http://127.0.0.1:9000/health >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${RUSTFS_CPU_LIMIT:-1.0}"
          memory: "${RUSTFS_MEMORY_LIMIT:-512M}"

  redis:
    profiles: ["infra"]
    image: redis:7.4-alpine
    <<: [*default-security, *redis-user]
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-256mb}",
        "--maxmemory-policy",
        "allkeys-lru",
        "--protected-mode",
        "yes",
        "--bind",
        "0.0.0.0",
        "--port",
        "6379",
      ]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: "${REDIS_MEMORY_LIMIT:-384M}"

  pgbouncer:
    profiles: ["infra"]
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    <<: *default-security
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-40}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-400}
      PGBOUNCER_MAX_DB_CONNECTIONS: ${PGBOUNCER_MAX_DB_CONNECTIONS:-80}
      PGBOUNCER_RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-10}
    expose:
      - "6432"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/pgbouncer-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${PGBOUNCER_CPU_LIMIT:-0.5}"
          memory: "${PGBOUNCER_MEMORY_LIMIT:-128M}"

  migrate:
    profiles: ["infra"]
    image: ${DOCKERHUB_USERNAME:?Set DOCKERHUB_USERNAME}/${BACKEND_IMAGE_REPO:-brolier360-pos-backend}:${BACKEND_IMAGE_TAG:?Set BACKEND_IMAGE_TAG}
    <<: [*default-security, *backend-user]
    restart: "no"
    logging: *default-logging
    networks:
      - data
    depends_on:
      pgbouncer:
        condition: service_healthy
    environment:
      <<: *backend-env
      DATABASE_URL: ${BACKEND_MIGRATE_DATABASE_URL:?Set BACKEND_MIGRATE_DATABASE_URL}
    command: ["python", "migrate.py", "--tenants"]

  backend-1:
    <<: *backend-app

  backend-2:
    <<: *backend-app

  caddy:
    image: ${DOCKERHUB_USERNAME:?Set DOCKERHUB_USERNAME}/${CADDY_IMAGE_REPO:-brolier360-pos-caddy}:${CADDY_IMAGE_TAG:?Set CADDY_IMAGE_TAG}
    <<: [*default-security, *caddy-user, *caddy-hardening]
    restart: unless-stopped
    logging: *default-logging
    networks:
      - edge
      - data
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?Set CADDY_ACME_EMAIL}
      CADDY_PUBLIC_HOST: ${CADDY_PUBLIC_HOST:?Set CADDY_PUBLIC_HOST}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile && pidof caddy >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${CADDY_CPU_LIMIT:-1.0}"
          memory: "${CADDY_MEMORY_LIMIT:-256M}"

volumes:
  caddy-data:
  caddy-config:
