name: Docker Security

on:
  pull_request:
    paths:
      - "backend/Dockerfile"
      - "caddy/Dockerfile"
      - "nginx/Dockerfile"
      - "rustfs/Dockerfile"
      - "docker-compose.prod.yml"
      - "compose.yaml"
      - ".github/workflows/docker-security.yml"
  push:
    branches:
      - prod
    paths:
      - "backend/Dockerfile"
      - "caddy/Dockerfile"
      - "nginx/Dockerfile"
      - "rustfs/Dockerfile"
      - "docker-compose.prod.yml"
      - "compose.yaml"
      - ".github/workflows/docker-security.yml"

permissions:
  contents: read
  security-events: write

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: caddy/Dockerfile
          failure-threshold: warning

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: nginx/Dockerfile
          failure-threshold: warning

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: rustfs/Dockerfile
          failure-threshold: warning

  trivy-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            file: ./backend/Dockerfile
            target: runtime
          - name: caddy
            context: ./caddy
            file: ./caddy/Dockerfile
            target: runtime
          - name: nginx
            context: ./nginx
            file: ./nginx/Dockerfile
            target: runtime
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          load: true
          tags: duropos-${{ matrix.name }}:scan
          cache-from: type=gha,scope=${{ matrix.name }}-security
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-security

      - name: Scan ${{ matrix.name }} image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: duropos-${{ matrix.name }}:scan
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}
