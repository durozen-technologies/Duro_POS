name: Deploy Production

on:
  push:
    branches:
      - prod
    paths:
      - "backend/**"
      - "caddy/**"
      - "docker-compose.prod.yml"
      - "rustfs/**"
      - "pgbouncer/**"
      - "scripts/**"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:
    inputs:
      skip_build:
        description: Deploy existing Docker Hub images without rebuilding
        type: boolean
        default: false
      build_backend:
        description: Build and deploy backend (manual runs only)
        type: boolean
        default: true
      build_caddy:
        description: Build and deploy caddy (manual runs only)
        type: boolean
        default: true
      image_tag:
        description: Image tag to deploy when skip_build is true (default latest)
        type: string
        required: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  BACKEND_IMAGE: brolier360-pos-backend
  CADDY_IMAGE: brolier360-pos-caddy

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      caddy: ${{ steps.filter.outputs.caddy }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            caddy:
              - 'caddy/**'
            deploy:
              - 'docker-compose.prod.yml'
              - 'rustfs/**'
              - 'pgbouncer/**'
              - 'scripts/**'
              - '.github/workflows/deploy-prod.yml'

  build-backend:
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_build != true && inputs.build_backend == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          provenance: true
          sbom: true
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_REVISION=${{ github.sha }}
            PYTHON_VERSION=3.11.11
            UV_VERSION=0.11.3
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-caddy:
    needs: changes
    if: |
      needs.changes.outputs.caddy == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_build != true && inputs.build_caddy == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./caddy
          file: ./caddy/Dockerfile
          target: runtime
          push: true
          provenance: true
          sbom: true
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_REVISION=${{ github.sha }}
            CADDY_VERSION=2.9.1
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE }}:latest
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  deploy:
    needs: [changes, build-backend, build-caddy]
    if: |
      always() &&
      (needs.build-backend.result == 'success' ||
       needs.build-caddy.result == 'success' ||
       needs.build-backend.result == 'skipped' ||
       needs.build-caddy.result == 'skipped') &&
      (needs.changes.outputs.backend == 'true' ||
       needs.changes.outputs.caddy == 'true' ||
       needs.changes.outputs.deploy == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve deploy plan
        id: plan
        env:
          GITHUB_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_BACKEND: ${{ needs.changes.outputs.backend }}
          CHANGED_CADDY: ${{ needs.changes.outputs.caddy }}
          CHANGED_DEPLOY: ${{ needs.changes.outputs.deploy }}
          BUILT_BACKEND: ${{ needs.build-backend.result }}
          BUILT_CADDY: ${{ needs.build-caddy.result }}
          SKIP_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_build }}
          MANUAL_BACKEND: ${{ github.event_name == 'workflow_dispatch' && inputs.build_backend }}
          MANUAL_CADDY: ${{ github.event_name == 'workflow_dispatch' && inputs.build_caddy }}
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag }}
        run: |
          DEPLOY_BACKEND=false
          DEPLOY_CADDY=false
          BACKEND_TAG="${GITHUB_SHA}"
          CADDY_TAG="${GITHUB_SHA}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${INPUT_TAG:-}" ]; then
            BACKEND_TAG="${INPUT_TAG}"
            CADDY_TAG="${INPUT_TAG}"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$SKIP_BUILD" = "true" ]; then
            if [ "$MANUAL_BACKEND" = "true" ]; then DEPLOY_BACKEND=true; fi
            if [ "$MANUAL_CADDY" = "true" ]; then DEPLOY_CADDY=true; fi
          else
            if [ "$CHANGED_BACKEND" = "true" ] || [ "$BUILT_BACKEND" = "success" ]; then
              DEPLOY_BACKEND=true
            fi
            if [ "$CHANGED_CADDY" = "true" ] || [ "$BUILT_CADDY" = "success" ]; then
              DEPLOY_CADDY=true
            fi
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              if [ "$MANUAL_BACKEND" = "true" ]; then DEPLOY_BACKEND=true; else DEPLOY_BACKEND=false; fi
              if [ "$MANUAL_CADDY" = "true" ]; then DEPLOY_CADDY=true; else DEPLOY_CADDY=false; fi
            fi
          fi

          if [ "$CHANGED_DEPLOY" = "true" ] && [ "$DEPLOY_BACKEND" = "false" ] && [ "$DEPLOY_CADDY" = "false" ]; then
            SYNC_COMPOSE=true
          else
            SYNC_COMPOSE=false
          fi

          {
            echo "deploy_backend=$DEPLOY_BACKEND"
            echo "deploy_caddy=$DEPLOY_CADDY"
            echo "sync_compose=$SYNC_COMPOSE"
            echo "backend_tag=$BACKEND_TAG"
            echo "caddy_tag=$CADDY_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Create production .env
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          CADDY_IMAGE: ${{ env.CADDY_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          BACKEND_IMAGE_TAG: ${{ steps.plan.outputs.backend_tag }}
          CADDY_IMAGE_TAG: ${{ steps.plan.outputs.caddy_tag }}
          DEPLOY_BACKEND: ${{ steps.plan.outputs.deploy_backend }}
          DEPLOY_CADDY: ${{ steps.plan.outputs.deploy_caddy }}
          SYNC_COMPOSE: ${{ steps.plan.outputs.sync_compose }}
          CADDY_PUBLIC_HOST: ${{ secrets.CADDY_PUBLIC_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RUSTFS_ACCESS_KEY: ${{ secrets.RUSTFS_ACCESS_KEY }}
          RUSTFS_SECRET_KEY: ${{ secrets.RUSTFS_SECRET_KEY }}
          RUSTFS_SERVER_DOMAINS: ${{ secrets.RUSTFS_SERVER_DOMAINS }}
          BACKEND_SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
          CADDY_ACME_EMAIL: ${{ secrets.CADDY_ACME_EMAIL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          BACKEND_RUSTFS_BUCKET_NAME: ${{ secrets.BACKEND_RUSTFS_BUCKET_NAME }}
          BACKEND_ALLOWED_HOSTS: '["${{ secrets.CADDY_PUBLIC_HOST }}","127.0.0.1","localhost","backend"]'
          BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
          BACKEND_TRUSTED_PROXIES: '["172.16.0.0/12","10.0.0.0/8","192.168.0.0/16"]'
        run: |
          missing=()
          for key in CADDY_PUBLIC_HOST DOCKERHUB_USERNAME POSTGRES_PASSWORD \
            RUSTFS_ACCESS_KEY RUSTFS_SECRET_KEY RUSTFS_SERVER_DOMAINS \
            BACKEND_SECRET_KEY CADDY_ACME_EMAIL REDIS_PASSWORD BACKEND_CORS_ORIGINS; do
            if [ -z "${!key}" ]; then
              missing+=("${key}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets: ${missing[*]}" >&2
            exit 1
          fi

          python3 <<'PY'
          import os
          import re

          def env_line(key: str, value: str) -> str:
              if re.search(r'[\s#"\\]', value):
                  escaped = value.replace("\\", "\\\\").replace('"', '\\"')
                  return f'{key}="{escaped}"\n'
              return f"{key}={value}\n"

          def non_empty(key: str, default: str) -> str:
              return (os.environ.get(key) or "").strip() or default

          pairs = {
              "DOCKERHUB_USERNAME": os.environ["DOCKERHUB_USERNAME"],
              "BACKEND_IMAGE_REPO": os.environ.get("BACKEND_IMAGE", "brolier360-pos-backend"),
              "CADDY_IMAGE_REPO": os.environ.get("CADDY_IMAGE", "brolier360-pos-caddy"),
              "BACKEND_IMAGE_TAG": os.environ.get("BACKEND_IMAGE_TAG", "latest"),
              "CADDY_IMAGE_TAG": os.environ.get("CADDY_IMAGE_TAG", "latest"),
              "DEPLOY_BACKEND": os.environ.get("DEPLOY_BACKEND", "false"),
              "DEPLOY_CADDY": os.environ.get("DEPLOY_CADDY", "false"),
              "SYNC_COMPOSE": os.environ.get("SYNC_COMPOSE", "false"),
              "POSTGRES_DATA_DIR": "/home/ubuntu/pos-postgress/data",
              "RUSTFS_DATA_DIR": "/home/ubuntu/rustfs/data",
              "POSTGRES_DB": non_empty("POSTGRES_DB", "brolier_360"),
              "POSTGRES_USER": non_empty("POSTGRES_USER", "postgres"),
              "POSTGRES_PASSWORD": os.environ["POSTGRES_PASSWORD"],
              "RUSTFS_ACCESS_KEY": os.environ["RUSTFS_ACCESS_KEY"],
              "RUSTFS_SECRET_KEY": os.environ["RUSTFS_SECRET_KEY"],
              "RUSTFS_SERVER_DOMAINS": os.environ["RUSTFS_SERVER_DOMAINS"],
              "BACKEND_SECRET_KEY": os.environ["BACKEND_SECRET_KEY"],
              "REDIS_PASSWORD": os.environ["REDIS_PASSWORD"],
              "BACKEND_PRODUCTION": "True",
              "BACKEND_ALLOWED_HOSTS": os.environ["BACKEND_ALLOWED_HOSTS"],
              "BACKEND_CORS_ORIGINS": os.environ["BACKEND_CORS_ORIGINS"],
              "BACKEND_TRUSTED_PROXIES": os.environ["BACKEND_TRUSTED_PROXIES"],
              "BACKEND_RUSTFS_BUCKET_NAME": os.environ.get("BACKEND_RUSTFS_BUCKET_NAME", "brolier-360"),
              "CADDY_ACME_EMAIL": os.environ["CADDY_ACME_EMAIL"],
              "CADDY_PUBLIC_HOST": os.environ["CADDY_PUBLIC_HOST"],
          }

          with open(".env.deploy", "w", encoding="utf-8") as fh:
              for key, value in pairs.items():
                  fh.write(env_line(key, value))
          PY

      - name: Normalize deploy target
        env:
          RAW_HOST: ${{ secrets.DEPLOY_HOST }}
          RAW_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=()
          if [ -z "$RAW_HOST" ]; then missing+=("DEPLOY_HOST"); fi
          if [ -z "$RAW_PATH" ]; then missing+=("DEPLOY_PATH"); fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            missing+=("DEPLOY_USER/DEPLOY_SSH_KEY")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing deploy secrets: ${missing[*]}" >&2
            exit 1
          fi

          DEPLOY_HOST="${RAW_HOST#https://}"
          DEPLOY_HOST="${DEPLOY_HOST#http://}"
          DEPLOY_HOST="${DEPLOY_HOST%%/*}"
          DEPLOY_HOST="${DEPLOY_HOST%/}"

          if [ -z "$DEPLOY_HOST" ] || echo "$DEPLOY_HOST" | grep -q '[[:space:]]'; then
            echo "DEPLOY_HOST must be hostname or IP only (no https://)." >&2
            echo "Example: ec2-16-113-19-64.ap-south-2.compute.amazonaws.com" >&2
            exit 1
          fi

          DEPLOY_PATH="${RAW_PATH%/}"
          if [ "${DEPLOY_PATH#/}" = "$DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH must be an absolute path, e.g. /home/ubuntu/brolier360-pos" >&2
            exit 1
          fi

          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"
          echo "DEPLOY_PATH=$DEPLOY_PATH" >> "$GITHUB_ENV"
          echo "Deploy target: ${{ secrets.DEPLOY_USER }}@${DEPLOY_HOST}:${DEPLOY_PATH}"

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,.env.deploy,scripts/deploy-prod.sh,scripts/pos-logs.sh,scripts/postgres-recover.sh,pgbouncer,rustfs"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 0

      - uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            mv -f .env.deploy .env
            chmod +x scripts/deploy-prod.sh scripts/pos-logs.sh scripts/postgres-recover.sh
            export DOCKERHUB_USERNAME="${DOCKERHUB_USERNAME}"
            export DOCKERHUB_TOKEN="${DOCKERHUB_TOKEN}"
            bash scripts/deploy-prod.sh
