name: Backend Tests

on:
  pull_request:
    paths:
      - "backend/**"
      - "test/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches:
      - main
      - prod
    paths:
      - "backend/**"
      - "test/**"
      - ".github/workflows/backend-tests.yml"

env:
  TZ: UTC

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --locked

      - name: Tenant baseline table check
        run: uv run python scripts/check_tenant_baseline.py

      - name: Public schema contract check
        run: uv run python scripts/check_public_schema.py

      - name: Run unit tests
        working-directory: ${{ github.workspace }}
        run: |
          PYTHONPATH=backend:. uv run --project backend python -m unittest discover -s test/unit -p "test_*.py" -v
